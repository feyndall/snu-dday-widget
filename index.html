<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모의고사 및 수능 D-Day</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* 영문/숫자는 Georgia 최우선, 한글은 Noto Serif KR 강제 적용 */
            font-family: "Georgia", "Times New Roman", "Noto Serif KR", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: transparent; 
        }
        .wrapper {
            display: flex;
            gap: 20px; 
            flex-wrap: wrap; 
            justify-content: center;
            padding: 20px;
        }
        .widget-card {
            text-align: center;
            padding: 30px 40px;
            border-radius: 12px;
            background-color: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); 
            border: 1px solid #e9e9e7; 
            min-width: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .label {
            font-size: 14px;
            font-weight: 600; /* 중간 굵기 적용 */
            color: #787774;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .d-day {
            font-weight: 900; /* 가장 굵은 굵기 강제 적용 */
            letter-spacing: -1px;
            margin: 0;
        }
        .d-day.snu {
            font-size: 40px; 
            color: #0F0F70; 
        }
        .d-day.main {
            font-size: 48px; 
            color: #E03E3E; 
        }
        .date-info {
            font-size: 12px;
            color: #9f9e9b;
            margin-top: 12px;
            font-family: "Noto Serif KR", serif; /* 날짜 부분도 명조체 통일 */
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="widget-card">
            <div class="label">6월 모의평가</div>
            <div class="d-day snu" id="dday-6mo">계산 중...</div>
            <div class="date-info">2026년 6월 4일 목요일</div>
        </div>
        
        <div class="widget-card">
            <div class="label">9월 모의평가</div>
            <div class="d-day snu" id="dday-9mo">계산 중...</div>
            <div class="date-info">2026년 9월 2일 수요일</div>
        </div>

        <div class="widget-card">
            <div class="label">2027학년도 수능</div>
            <div class="d-day main" id="dday-suneung">계산 중...</div>
            <div class="date-info">2026년 11월 19일 목요일</div>
        </div>
    </div>

    <script>
        function calcDday(targetDateString, elementId) {
            const today = new Date();
            today.setHours(0, 0, 0, 0); 
            
            const targetDate = new Date(targetDateString);
            const diffTime = targetDate.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let displayText = "";
            if (diffDays > 0) {
                displayText = `D - ${diffDays}`;
            } else if (diffDays === 0) {
                displayText = "D-Day";
            } else {
                displayText = `D + ${Math.abs(diffDays)}`;
            }
            
            document.getElementById(elementId).innerText = displayText;
        }

        function updateAll() {
            calcDday('2026-06-04T00:00:00+09:00', 'dday-6mo');
            calcDday('2026-09-02T00:00:00+09:00', 'dday-9mo');
            calcDday('2026-11-19T00:00:00+09:00', 'dday-suneung');
        }

        updateAll();
        setInterval(updateAll, 1000 * 60 * 60); 
    </script>
</body>
</html>
