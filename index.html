<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수능 D-Day</title>
    <style>
        body {
            /* 노션과 이질감이 없도록 기본 시스템 폰트 적용 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent; 
        }
        .widget-container {
            text-align: center;
            padding: 30px 50px;
            border-radius: 12px;
            background-color: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); /* 옅은 그림자 효과 */
            border: 1px solid #e9e9e7; /* 노션 스타일 테두리 */
        }
        .label {
            font-size: 16px;
            font-weight: 600;
            color: #787774;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .d-day {
            /* 글자 크기를 56px로 크게 설정 (원하는 수치로 변경 가능) */
            font-size: 56px; 
            font-weight: 800;
            /* 서울대학교 로고 상징색 (SNU Blue) 적용 */
            color: #0F0F70; 
            letter-spacing: -2px;
            margin: 0;
        }
        .date-info {
            font-size: 13px;
            color: #9f9e9b;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="label">2027학년도 대학수학능력시험</div>
        <div class="d-day" id="dday-display">계산 중...</div>
        <div class="date-info">2026년 11월 19일 목요일</div>
    </div>

    <script>
        function updateDday() {
            const today = new Date();
            today.setHours(0, 0, 0, 0); 
            
            const targetDate = new Date('2026-11-19T00:00:00+09:00');
            const diffTime = targetDate.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let displayText = "";
            if (diffDays > 0) {
                displayText = `D - ${diffDays}`;
            } else if (diffDays === 0) {
                displayText = "D-Day";
            } else {
                displayText = `D + ${Math.abs(diffDays)}`;
            }
            
            document.getElementById('dday-display').innerText = displayText;
        }

        updateDday();
        // 1시간 주기로 날짜를 다시 확인하여 자동 갱신
        setInterval(updateDday, 1000 * 60 * 60); 
    </script>
</body>
</html>
