<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모의고사 및 수능 D-Day</title>
    <style>
        body {
            /* 세리프(명조체) 폰트 스택 적용 */
            font-family: "Nanum Myeongjo", "Apple Myungjo", "Batang", "Georgia", "Times New Roman", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent; 
        }
        .widget-container {
            text-align: center;
            padding: 35px 45px;
            border-radius: 12px;
            background-color: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); 
            border: 1px solid #e9e9e7; 
            min-width: 260px;
        }
        .dday-item {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px dashed #e9e9e7;
        }
        .dday-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .label {
            font-size: 14px;
            font-weight: 600;
            color: #787774;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        /* 모의평가 D-Day 기본 스타일 - 서울대학교 로고색 (SNU Blue) 적용 */
        .d-day {
            font-size: 32px; 
            font-weight: 800;
            color: #0F0F70; /* **변경됨: 남색** */
            letter-spacing: -1px;
            margin: 0;
        }
        /* 수능 D-Day 강조 스타일 - 선명한 빨간색 유지 및 글자 크기 키움 */
        .d-day.main {
            font-size: 48px; 
            color: #E03E3E; /* **유지됨: 빨간색** */
        }
        .date-info {
            font-size: 12px;
            color: #9f9e9b;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="dday-item">
            <div class="label">6월 모의평가</div>
            <div class="d-day" id="dday-6mo">계산 중...</div>
            <div class="date-info">2026년 6월 4일 목요일</div>
        </div>
        
        <div class="dday-item">
            <div class="label">9월 모의평가</div>
            <div class="d-day" id="dday-9mo">계산 중...</div>
            <div class="date-info">2026년 9월 2일 수요일</div>
        </div>

        <div class="dday-item">
            <div class="label">2027학년도 수능</div>
            <div class="d-day main" id="dday-suneung">계산 중...</div>
            <div class="date-info">2026년 11월 19일 목요일</div>
        </div>
    </div>

    <script>
        // 날짜 계산 및 표시 공통 함수
        function calcDday(targetDateString, elementId) {
            const today = new Date();
            today.setHours(0, 0, 0, 0); 
            
            const targetDate = new Date(targetDateString);
            const diffTime = targetDate.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let displayText = "";
            if (diffDays > 0) {
                displayText = `D - ${diffDays}`;
            } else if (diffDays === 0) {
                displayText = "D-Day";
            } else {
                displayText = `D + ${Math.abs(diffDays)}`;
            }
            
            document.getElementById(elementId).innerText = displayText;
        }

        // 전체 업데이트
        function updateAll() {
            // 공식 일정 반영
            calcDday('2026-06-04T00:00:00+09:00', 'dday-6mo');
            calcDday('2026-09-02T00:00:00+09:00', 'dday-9mo');
            calcDday('2026-11-19T00:00:00+09:00', 'dday-suneung');
        }

        updateAll();
        setInterval(updateAll, 1000 * 60 * 60); // 1시간 주기로 갱신
    </script>
</body>
</html>
