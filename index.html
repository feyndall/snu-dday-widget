<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수능 D-Day</title>
    <style>
        body {
            /* 세리프(명조체) 폰트 스택 적용 */
            font-family: "Nanum Myeongjo", "Apple Myungjo", "Batang", "Georgia", "Times New Roman", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent; 
        }
        .widget-container {
            text-align: center;
            padding: 30px 50px;
            border-radius: 12px;
            background-color: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); 
            border: 1px solid #e9e9e7; 
        }
        .label {
            font-size: 16px;
            font-weight: 600;
            color: #787774;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .d-day {
            font-size: 56px; 
            font-weight: 800;
            /* 선택한 선명한 빨간색 헥스 코드로 변경 */
            color: #E03E3E; 
            letter-spacing: -2px;
            margin: 0;
        }
        }
        .date-info {
            font-size: 13px;
            color: #9f9e9b;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="label">2027학년도 대학수학능력시험</div>
        <div class="d-day" id="dday-display">계산 중...</div>
        <div class="date-info">2026년 11월 19일 목요일</div>
    </div>

    <script>
        function updateDday() {
            const today = new Date();
            today.setHours(0, 0, 0, 0); 
            
            const targetDate = new Date('2026-11-19T00:00:00+09:00');
            const diffTime = targetDate.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let displayText = "";
            if (diffDays > 0) {
                displayText = `D - ${diffDays}`;
            } else if (diffDays === 0) {
                displayText = "D-Day";
            } else {
                displayText = `D + ${Math.abs(diffDays)}`;
            }
            
            document.getElementById('dday-display').innerText = displayText;
        }

        updateDday();
        setInterval(updateDday, 1000 * 60 * 60); 
    </script>
</body>
</html>
